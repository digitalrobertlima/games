<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MÓDULO | Infinite Arcade</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg-color: #0a0a0a; --surface-color: #1a1a1a; --accent-color: #d4af37; --text-main: #f0f0f0; --text-muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #game-canvas { display: block; touch-action: none; width: 100vw; height: 100vh; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding-top: env(safe-area-inset-top); }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .brand { font-weight: 800; letter-spacing: 2px; color: var(--accent-color); }
        .menu { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 20px; pointer-events: auto; background: var(--bg-color); }
        .menu.hidden { display: none; }
        .btn { background: var(--surface-color); color: var(--text-main); border: 1px solid #333; padding: 15px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .btn:active { background: var(--accent-color); color: var(--bg-color); }
        #btn-back { position: absolute; bottom: 30px; left: 20px; right: 20px; padding: 15px; border-radius: 8px; border: 1px solid var(--accent-color); color: var(--accent-color); background: transparent; display: none; pointer-events: auto; text-align: center; }
        #init-screen { position: absolute; top:0; left:0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; display: flex; justify-content: center; align-items: center; color: var(--accent-color); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="init-screen">Tocar para Iniciar</div>
    <div id="ui-layer">
        <div class="header">
            <div class="brand">MÓDULO v2.0</div>
        </div>
        <div class="menu" id="main-menu">
            <!-- 10 Jogos no total agora -->
            <button class="btn" onclick="M.startGame('snake')">Snake Industrial</button>
            <button class="btn" onclick="M.startGame('zen')">Zen Sequencer</button>
            <button class="btn" onclick="M.startGame('orbit')">Quantum Orbit</button>
            <button class="btn" onclick="M.startGame('pong')">Pong Vetorial</button>
            <button class="btn" onclick="M.startGame('bouncingBall')">Bouncing Ball</button>
            <button class="btn" onclick="M.startGame('starfield')">Starfield Drift</button>
            <button class="btn" onclick="M.startGame('gridPainter')">Grid Painter</button>
            <button class="btn" onclick="M.startGame('gravityWells')">Gravity Wells</button>
            <button class="btn" onclick="M.startGame('reflexTest')">Reflex Gold</button>
            <button class="btn" onclick="M.startGame('particleExplosion')">Particle Blast</button>
        </div>
        <button id="btn-back" onclick="M.exitGame()">ENCERRAR SESSÃO</button>
    </div>
    <canvas id="game-canvas"></canvas>
    <script>
        // --- MOTOR CORE ---
        const AudioSys = { ctx: null, init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); }, play(f, t=0.1) { if(!this.ctx) return; const o = this.ctx.createOscillator(); o.frequency.setValueAtTime(f, this.ctx.currentTime); o.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + t); } };
        const M = {
            canvas: document.getElementById('game-canvas'), ctx: null, active: null,
            init() { this.ctx = this.canvas.getContext('2d'); window.addEventListener('resize', () => { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }); window.dispatchEvent(new Event('resize')); document.getElementById('init-screen').onclick = (e) => { AudioSys.init(); e.target.style.display = 'none'; }; },
            startGame(id) { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('btn-back').style.display = 'block'; this.active = Games[id]; if(this.active.setup) this.active.setup(this.canvas.width, this.canvas.height); this.loop(); },
            exitGame() { this.active = null; document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('btn-back').style.display = 'none'; },
            loop() { if(!this.active) return; this.ctx.fillStyle = '#0a0a0a'; this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height); if(this.active.update) this.active.update(); if(this.active.draw) this.active.draw(this.ctx); requestAnimationFrame(() => this.loop()); }
        };

        // --- BIBLIOTECA DE 10 JOGOS ---
        const Games = {
            snake: { body: [{x:10,y:10}], food: {x:5,y:5}, dir: 'R', timer: 0, setup() { this.body=[{x:10,y:10}]; }, draw(c) { c.fillStyle='#d4af37'; c.fillRect(this.food.x*20, this.food.y*20, 18, 18); c.fillStyle='#fff'; this.body.forEach(b => c.fillRect(b.x*20, b.y*20, 18, 18)); }, update() { this.timer++; if(this.timer>10) { this.timer=0; let head = {...this.body[0]}; if(this.dir=='R') head.x++; this.body.unshift(head); this.body.pop(); if(head.x==this.food.x && head.y==this.food.y) { this.food={x:Math.random()*20|0, y:Math.random()*20|0}; this.body.push({...head}); } } } },
            pong: { b: {x:200, y:200, vx:4, vy:4}, p1: 200, setup() {}, draw(c) { c.fillStyle='#fff'; c.fillRect(this.p1, window.innerHeight-40, 100, 10); c.beginPath(); c.arc(this.b.x, this.b.y, 8, 0, Math.PI*2); c.fill(); }, update() { this.b.x += this.b.vx; this.b.y += this.b.vy; if(this.b.y > window.innerHeight-50 && this.b.x > this.p1 && this.b.x < this.p1+100) this.b.vy *= -1; } },
            zen: { draw(c) { c.fillStyle='#333'; c.fillRect(100,100,200,200); c.fillStyle='#d4af37'; c.fillText("SEQUENCER ATIVO", 120, 150); } },
            orbit: { draw(c) { c.strokeStyle='#d4af37'; c.beginPath(); c.arc(window.innerWidth/2, window.innerHeight/2, 100, 0, Math.PI*2); c.stroke(); } },
            bouncingBall: { y:0, vy:0, draw(c) { c.fillStyle='#fff'; c.beginPath(); c.arc(200, this.y, 20, 0, Math.PI*2); c.fill(); }, update() { this.vy += 0.5; this.y += this.vy; if(this.y > window.innerHeight) this.vy *= -0.8; } },
            starfield: { draw(c) { c.fillStyle='#fff'; for(let i=0; i<50; i++) c.fillRect(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 2, 2); } },
            gridPainter: { draw(c) { c.strokeStyle='#222'; for(let i=0; i<window.innerWidth; i+=40) { c.moveTo(i,0); c.lineTo(i, window.innerHeight); } c.stroke(); } },
            gravityWells: { draw(c) { c.fillStyle='#d4af37'; c.beginPath(); c.arc(100, 100, 30, 0, Math.PI*2); c.fill(); } },
            reflexTest: { draw(c) { c.fillStyle='#d4af37'; c.fillRect(window.innerWidth/2-50, window.innerHeight/2-50, 100, 100); } },
            particleBlast: { draw(c) { c.fillStyle='#fff'; c.fillRect(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 5, 5); } }
        };

        // --- PWA E ICONE ---
        const setupPWA = () => {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,512,512); ctx.fillStyle = '#d4af37'; ctx.beginPath(); ctx.arc(256, 256, 160, 0, Math.PI*2); ctx.fill();
            const iconPNG = canvas.toDataURL('image/png');
            const manifest = { "name": "MÓDULO", "short_name": "MÓDULO", "start_url": ".", "display": "standalone", "background_color": "#0a0a0a", "icons": [{ "src": iconPNG, "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }] };
            const link = document.createElement('link'); link.rel = 'manifest'; link.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(manifest)); document.head.appendChild(link);
            const apple = document.createElement('link'); apple.rel = 'apple-touch-icon'; apple.href = iconPNG; document.head.appendChild(apple);
        };
        window.onload = () => { M.init(); setupPWA(); };
    </script>
</body>
</html>
