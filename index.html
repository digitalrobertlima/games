<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓDULO | Infinite Arcade</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg-color: #0a0a0a; --surface-color: #1a1a1a; --accent-color: #d4af37; --text-main: #f0f0f0; --text-muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .header { padding: 20px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, #0a0a0a, transparent); pointer-events: auto; }
        .brand { font-weight: 800; letter-spacing: 2px; color: var(--accent-color); }
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; pointer-events: auto; width: 90%; max-width: 400px; }
        .btn { background: #1a1a1a; color: var(--text-main); border: 1px solid var(--accent-color); padding: 10px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; }
        .btn-back { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); pointer-events: auto; background: #333; color: white; padding: 10px 20px; border-radius: 20px; border: none; display: none; }
        #game-canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <div class="brand">MÓDULO</div>
            <div id="xp-display">Nível 1</div>
        </div>
        <div class="menu" id="main-menu">
            <!-- 10 Jogos -->
            <button class="btn" onclick="M.startGame('snake')">Snake</button>
            <button class="btn" onclick="M.startGame('zen')">Zen Matrix</button>
            <button class="btn" onclick="M.startGame('orbit')">Quantum Orbit</button>
            <button class="btn" onclick="M.startGame('pong')">Pong</button>
            <button class="btn" onclick="M.startGame('dodge')">Dodge</button>
            <button class="btn" onclick="M.startGame('clicker')">Gold Tap</button>
            <button class="btn" onclick="M.startGame('fill')">Fill Grid</button>
            <button class="btn" onclick="M.startGame('catch')">Catch</button>
            <button class="btn" onclick="M.startGame('memory')">Memory</button>
            <button class="btn" onclick="M.startGame('target')">Target</button>
        </div>
        <button class="btn-back" id="btn-back" onclick="M.exitGame()">ENCERRAR</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const AudioSys = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); },
            play(freq, dur=0.1) { if(!this.ctx) return; const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.frequency.value = freq; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + dur); }
        };

        const M = {
            canvas: document.getElementById('game-canvas'),
            ctx: document.getElementById('game-canvas').getContext('2d'),
            activeGame: null,
            init() { window.addEventListener('resize', () => { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }); this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; this.setupInput(); },
            setupInput() {
                this.canvas.addEventListener('mousedown', e => { if(this.activeGame?.onTap) this.activeGame.onTap(e.clientX, e.clientY); });
                this.canvas.addEventListener('mousemove', e => { if(this.activeGame?.onDrag) this.activeGame.onDrag(e.clientX, e.clientY); });
                this.canvas.addEventListener('touchstart', e => { if(this.activeGame?.onTap) this.activeGame.onTap(e.touches[0].clientX, e.touches[0].clientY); AudioSys.init(); });
            },
            startGame(id) { document.getElementById('main-menu').style.display = 'none'; document.getElementById('btn-back').style.display = 'block'; this.activeGame = Games[id]; this.activeGame.setup(this.canvas.width, this.canvas.height); this.loop(); },
            exitGame() { this.activeGame = null; document.getElementById('main-menu').style.display = 'grid'; document.getElementById('btn-back').style.display = 'none'; },
            loop() { if(!this.activeGame) return; this.ctx.fillStyle = '#0a0a0a'; this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height); this.activeGame.update(); this.activeGame.draw(this.ctx); requestAnimationFrame(()=>this.loop()); }
        };

        const Games = {
            snake: { body: [{x:10, y:10}], dir: 1, food: {x:5, y:5}, setup(w, h){}, update() { /* Lógica simplificada */ }, draw(ctx) { ctx.fillStyle='#d4af37'; ctx.fillRect(this.food.x*20, this.food.y*20, 18, 18); }},
            zen: { grid: Array(8).fill(0).map(()=>Array(8).fill(0)), setup(w,h){}, update(){}, draw(ctx) {}},
            orbit: { ps: Array(50).fill(0).map(()=>({x:100, y:100})), setup(w,h){}, update(){}, draw(ctx) {}},
            pong: { p1: 100, ball: {x:100, y:100, vx:5, vy:5}, setup(w,h){}, onDrag(x,y){ this.p1 = x; }, update(){ this.ball.x+=this.ball.vx; this.ball.y+=this.ball.vy; if(this.ball.y > M.canvas.height - 100) this.ball.vy*=-1; }, draw(ctx){ ctx.fillStyle='#fff'; ctx.fillRect(this.p1, M.canvas.height-60, 80, 10); ctx.beginPath(); ctx.arc(this.ball.x, this.ball.y, 10, 0, 7); ctx.fill(); }},
            dodge: { obs: [], setup(){}, update(){}, draw(ctx){}},
            clicker: { setup(){}, update(){}, draw(ctx){}},
            fill: { setup(){}, update(){}, draw(ctx){}},
            catch: { setup(){}, update(){}, draw(ctx){}},
            memory: { setup(){}, update(){}, draw(ctx){}},
            target: { setup(){}, update(){}, draw(ctx){}}
        };

        window.onload = () => M.init();
    </script>
</body>
</html>
