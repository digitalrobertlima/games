<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓDULO | Infinite Arcade</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #161616;
            --accent-color: #d4af37; /* Bronze Luxo */
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --border-color: rgba(212, 175, 55, 0.15);
            --font-main: 'Segoe UI', Roboto, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
            pointer-events: auto;
        }

        .brand-group { display: flex; align-items: center; gap: 10px; }
        .brand { font-weight: 900; letter-spacing: 3px; font-size: 1.1rem; color: var(--accent-color); }
        
        .xp-container { display: flex; flex-direction: column; align-items: flex-end; }
        .xp-text { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px;}
        .xp-bar-bg { width: 80px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s ease; }

        .btn-exit {
            display: none;
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        .btn-exit:active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* Menu de Protocolos Grid */
        .menu-container {
            position: absolute;
            top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: none;
        }
        .menu-container::-webkit-scrollbar { display: none; }
        .menu-container.hidden { opacity: 0; transform: translate(-50%, -45%); pointer-events: none; }

        .menu-title {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-game {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 18px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .btn-game:active {
            border-color: var(--accent-color);
            background: rgba(212, 175, 55, 0.05);
            transform: scale(0.97);
        }
        .btn-game span { font-size: 0.65rem; color: var(--text-muted); text-transform: lowercase; }

        /* Canvas de Renderização */
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        
        #init-screen {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; gap: 15px;
            justify-content: center; align-items: center;
            cursor: pointer;
        }
        .init-logo {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid var(--accent-color);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .init-logo-inner { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-color); }
        .init-text { color: var(--accent-color); font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
    </style>
</head>
<body>

    <div id="init-screen">
        <div class="init-logo"><div class="init-logo-inner"></div></div>
        <div class="init-text">Inicializar MÓDULO</div>
    </div>

    <div id="ui-layer">
        <div class="header">
            <div class="brand-group">
                <div class="brand">MÓDULO</div>
                <button class="btn-exit" id="btn-exit" onclick="M.exitGame()">FECHAR</button>
            </div>
            <div class="xp-container">
                <div class="xp-text">Nível <span id="ui-level">1</span></div>
                <div class="xp-bar-bg"><div class="xp-bar-fill" id="ui-xp"></div></div>
            </div>
        </div>

        <div class="menu-container" id="main-menu">
            <div class="menu-title">Consolo de Entretenimento Portátil</div>
            <div class="grid-menu">
                <button class="btn-game" onclick="M.startGame('snake')">SNAKE <span>grid clássico</span></button>
                <button class="btn-game" onclick="M.startGame('zen')">ZEN MATRIX <span>sequenciador</span></button>
                <button class="btn-game" onclick="M.startGame('orbit')">QUANTUM ORBIT <span>gravitacional</span></button>
                <button class="btn-game" onclick="M.startGame('pong')">VECT-PONG <span>colisão física</span></button>
                <button class="btn-game" onclick="M.startGame('breakout')">BREAKOUT <span>destruição</span></button>
                <button class="btn-game" onclick="M.startGame('life')">LIFE GAME <span>autômato bio</span></button>
                <button class="btn-game" onclick="M.startGame('pulser')">PULSER <span>ritmo analógico</span></button>
                <button class="btn-game" onclick="M.startGame('shield')">SHIELD CORE <span>defesa orbital</span></button>
                <button class="btn-game" onclick="M.startGame('maze')">LABIRINTO <span>procedural</span></button>
                <button class="btn-game" onclick="M.startGame('mines')">MINAS <span>tátil e precisão</span></button>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // 1. ENGINE DE ÁUDIO SINTETIZADO (Web Audio API)
        const AudioSys = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone(freq, type = 'sine', duration = 0.1, vol = 0.1) {
                if (!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e){}
            },
            playReward() {
                this.playTone(523.25, 'sine', 0.15, 0.15); // C5
                setTimeout(() => this.playTone(659.25, 'sine', 0.15, 0.15), 80); // E5
                setTimeout(() => this.playTone(783.99, 'sine', 0.3, 0.15), 160); // G5
            },
            playHit() { this.playTone(120, 'triangle', 0.08, 0.1); }
        };

        // 2. SISTEMA DE PROGRESSÃO E ESTADO
        const State = {
            xp: parseInt(localStorage.getItem('modulo_xp')) || 0,
            level: parseInt(localStorage.getItem('modulo_level')) || 1,
            addXP(amount) {
                this.xp += amount;
                const nextLevelReq = this.level * 100;
                if (this.xp >= nextLevelReq) {
                    this.xp -= nextLevelReq;
                    this.level++;
                    AudioSys.playReward();
                }
                localStorage.setItem('modulo_xp', this.xp);
                localStorage.setItem('modulo_level', this.level);
                this.updateUI();
            },
            updateUI() {
                document.getElementById('ui-level').innerText = this.level;
                const percent = (this.xp / (this.level * 100)) * 100;
                document.getElementById('ui-xp').style.width = `${percent}%`;
            }
        };

        // 3. MOTOR PRINCIPAL (Renderização e Loop)
        const M = {
            canvas: document.getElementById('game-canvas'),
            ctx: document.getElementById('game-canvas').getContext('2d'),
            width: 0, height: 0,
            activeGame: null,
            lastTime: 0,
            reqId: null,
            input: { x: 0, y: 0, isDown: false, swipeDir: null, startX: 0, startY: 0 },

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                State.updateUI();
                this.setupInput();
                
                document.getElementById('init-screen').addEventListener('click', (e) => {
                    AudioSys.init();
                    document.getElementById('init-screen').style.display = 'none';
                });
            },

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                if(this.activeGame && this.activeGame.setup) this.activeGame.setup(this.width, this.height);
            },

            setupInput() {
                const handleStart = (x, y) => {
                    this.input.isDown = true; this.input.x = x; this.input.y = y;
                    this.input.startX = x; this.input.startY = y;
                    this.input.swipeDir = null;
                    if(this.activeGame && this.activeGame.onTap) this.activeGame.onTap(x, y);
                };
                const handleMove = (x, y) => {
                    if(!this.input.isDown) return;
                    this.input.x = x; this.input.y = y;
                    if(this.activeGame && this.activeGame.onDrag) this.activeGame.onDrag(x, y);
                };
                const handleEnd = () => {
                    if(!this.input.isDown) return;
                    this.input.isDown = false;
                    const dx = this.input.x - this.input.startX;
                    const dy = this.input.y - this.input.startY;
                    if (Math.abs(dx) > 25 || Math.abs(dy) > 25) {
                        if (Math.abs(dx) > Math.abs(dy)) {
                            this.input.swipeDir = dx > 0 ? 'RIGHT' : 'LEFT';
                        } else {
                            this.input.swipeDir = dy > 0 ? 'DOWN' : 'UP';
                        }
                        if(this.activeGame && this.activeGame.onSwipe) this.activeGame.onSwipe(this.input.swipeDir);
                    }
                };

                this.canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
                this.canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
                window.addEventListener('mouseup', handleEnd);
                
                this.canvas.addEventListener('touchstart', e => {
                    handleStart(e.touches[0].clientX, e.touches[0].clientY);
                }, {passive: true});
                this.canvas.addEventListener('touchmove', e => {
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                }, {passive: true});
                window.addEventListener('touchend', handleEnd);
            },

            startGame(gameId) {
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('btn-exit').style.display = 'block';
                this.activeGame = Games[gameId];
                this.resize();
                this.lastTime = performance.now();
                this.loop(this.lastTime);
            },

            exitGame() {
                cancelAnimationFrame(this.reqId);
                this.activeGame = null;
                this.ctx.clearRect(0, 0, this.width, this.height);
                document.getElementById('main-menu').classList.remove('hidden');
                document.getElementById('btn-exit').style.display = 'none';
            },

            loop(timestamp) {
                if (!this.activeGame) return;
                const dt = timestamp - this.lastTime;
                this.lastTime = timestamp;

                this.ctx.fillStyle = '#0a0a0a';
                this.ctx.fillRect(0, 0, this.width, this.height);

                if(this.activeGame.update) this.activeGame.update(dt);
                if(this.activeGame.draw) this.activeGame.draw(this.ctx);

                this.reqId = requestAnimationFrame(t => this.loop(t));
            }
        };

        // 4. A MATRIZ DE JOGOS (10 Protocolos Completos)
        const Games = {
            
            // 01. SNAKE (Grid Clássico - Correção de comidinha interna)
            snake: {
                gridSize: 22, body: [], food: {}, dir: 'RIGHT', nextDir: 'RIGHT', timer: 0, speed: 130, cols:0, rows:0,
                setup(w, h) {
                    this.cols = Math.floor(w / this.gridSize);
                    this.rows = Math.floor((h - 80) / this.gridSize); // Desconto do Header
                    this.reset();
                },
                reset() {
                    this.body = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
                    this.dir = 'RIGHT'; this.nextDir = 'RIGHT';
                    this.spawnFood();
                },
                spawnFood() {
                    let valid = false;
                    while(!valid) {
                        this.food = {
                            x: Math.floor(Math.random() * (this.cols - 2)) + 1,
                            y: Math.floor(Math.random() * (this.rows - 2)) + 2 // Margem superior
                        };
                        valid = !this.body.some(p => p.x === this.food.x && p.y === this.food.y);
                    }
                },
                onSwipe(dir) {
                    if(dir === 'UP' && this.dir !== 'DOWN') this.nextDir = 'UP';
                    if(dir === 'DOWN' && this.dir !== 'UP') this.nextDir = 'DOWN';
                    if(dir === 'LEFT' && this.dir !== 'RIGHT') this.nextDir = 'LEFT';
                    if(dir === 'RIGHT' && this.dir !== 'LEFT') this.nextDir = 'RIGHT';
                },
                update(dt) {
                    this.timer += dt;
                    if(this.timer > this.speed) {
                        this.timer = 0;
                        this.dir = this.nextDir;
                        let head = {x: this.body[0].x, y: this.body[0].y};
                        
                        if(this.dir === 'RIGHT') head.x++;
                        if(this.dir === 'LEFT') head.x--;
                        if(this.dir === 'DOWN') head.y++;
                        if(this.dir === 'UP') head.y--;

                        if(head.x >= this.cols) head.x = 0;
                        if(head.x < 0) head.x = this.cols - 1;
                        if(head.y >= this.rows + 2) head.y = 2;
                        if(head.y < 2) head.y = this.rows + 1;

                        if(this.body.some(p => p.x === head.x && p.y === head.y)) {
                            AudioSys.playHit();
                            this.reset();
                            return;
                        }

                        this.body.unshift(head);

                        if(head.x === this.food.x && head.y === this.food.y) {
                            AudioSys.playTone(660, 'sine', 0.1, 0.12); 
                            State.addXP(10);
                            this.spawnFood();
                            this.speed = Math.max(70, this.speed - 1); 
                        } else {
                            this.body.pop();
                        }
                    }
                },
                draw(ctx) {
                    // Alimento Brilhante
                    ctx.fillStyle = '#d4af37';
                    ctx.shadowBlur = 12; ctx.shadowColor = '#d4af37';
                    ctx.fillRect(this.food.x * this.gridSize + 2, this.food.y * this.gridSize + 2, this.gridSize-4, this.gridSize-4);
                    ctx.shadowBlur = 0;

                    // Corpo da Serpente
                    this.body.forEach((p, i) => {
                        ctx.fillStyle = i === 0 ? '#f5f5f5' : '#444444';
                        ctx.fillRect(p.x * this.gridSize + 1, p.y * this.gridSize + 1, this.gridSize-2, this.gridSize-2);
                    });
                }
            },

            // 02. ZEN MATRIX (Sequenciador Pentatônico Tátil)
            zen: {
                grid: [], size: 8, cellSize: 40, offsetX: 0, offsetY: 0, timer: 0, beat: 0, tempo: 180,
                scale: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25], 
                setup(w, h) {
                    this.cellSize = Math.min(w, h) / 10;
                    this.offsetX = (w - (this.size * this.cellSize)) / 2;
                    this.offsetY = (h - (this.size * this.cellSize)) / 2 + 30;
                    this.grid = Array(this.size).fill(0).map(() => Array(this.size).fill(false));
                },
                onTap(x, y) {
                    let col = Math.floor((x - this.offsetX) / this.cellSize);
                    let row = Math.floor((y - this.offsetY) / this.cellSize);
                    if(col >= 0 && col < this.size && row >= 0 && row < this.size) {
                        this.grid[row][col] = !this.grid[row][col];
                        if(this.grid[row][col]) AudioSys.playTone(this.scale[7 - row], 'triangle', 0.15, 0.1);
                        State.addXP(2);
                    }
                },
                update(dt) {
                    this.timer += dt;
                    if(this.timer > this.tempo) {
                        this.timer = 0;
                        this.beat = (this.beat + 1) % this.size;
                        for(let r=0; r<this.size; r++) {
                            if(this.grid[r][this.beat]) {
                                AudioSys.playTone(this.scale[7 - r], 'sine', 0.4, 0.12);
                            }
                        }
                    }
                },
                draw(ctx) {
                    for(let r=0; r<this.size; r++) {
                        for(let c=0; c<this.size; c++) {
                            let x = this.offsetX + c * this.cellSize;
                            let y = this.offsetY + r * this.cellSize;
                            ctx.strokeStyle = '#222';
                            ctx.strokeRect(x, y, this.cellSize, this.cellSize);
                            
                            if(this.grid[r][c]) {
                                ctx.fillStyle = '#d4af37';
                                ctx.fillRect(x+3, y+3, this.cellSize-6, this.cellSize-6);
                            }
                            if(c === this.beat) {
                                ctx.fillStyle = 'rgba(212, 175, 55, 0.15)';
                                ctx.fillRect(x, y, this.cellSize, this.cellSize);
                            }
                        }
                    }
                }
            },

            // 03. QUANTUM ORBIT (Swarm Gravitacional)
            orbit: {
                particles: [], w:0, h:0,
                setup(w, h) {
                    this.w = w; this.h = h;
                    this.particles = Array(120).fill(0).map(() => ({
                        x: Math.random() * w, y: Math.random() * h,
                        vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3
                    }));
                },
                update(dt) {
                    let tx = M.input.isDown ? M.input.x : this.w/2;
                    let ty = M.input.isDown ? M.input.y : this.h/2;

                    this.particles.forEach(p => {
                        let dx = tx - p.x;
                        let dy = ty - p.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist > 0) {
                            let f = M.input.isDown ? 0.08 : 0.008; 
                            p.vx += (dx / dist) * f;
                            p.vy += (dy / dist) * f;
                        }
                        p.vx *= 0.985; p.vy *= 0.985;
                        p.x += p.vx; p.y += p.vy;
                        
                        if(M.input.isDown && dist < 22) {
                            p.x = Math.random() * this.w; 
                            p.y = 0;
                            AudioSys.playTone(500 + Math.random()*500, 'sine', 0.06, 0.04);
                            State.addXP(1);
                        }
                    });
                },
                draw(ctx) {
                    ctx.fillStyle = '#d4af37';
                    this.particles.forEach(p => {
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1.0;
                    if(M.input.isDown) {
                        ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                        ctx.beginPath();
                        ctx.arc(M.input.x, M.input.y, 22, 0, Math.PI*2);
                        ctx.stroke();
                    }
                }
            },

            // 04. VECT-PONG (Com margem tátil de controle superior corrigida)
            pong: {
                ball: {x:0, y:0, vx:6, vy:6, r:8},
                pad1: {x:0, y:0, w:90, h:10}, 
                pad2: {x:0, y:0, w:90, h:10}, 
                w:0, h:0,
                setup(w, h) {
                    this.w = w; this.h = h;
                    this.ball.x = w/2; this.ball.y = h/2;
                    // Posicionamento inteligente: pad1 sobe 100px para ficar completamente visível e livre de toques na quina da tela
                    this.pad1.y = h - 100; 
                    this.pad2.y = 100;
                    this.pad1.x = w/2 - 45;
                    this.pad2.x = w/2 - 45;
                },
                onDrag(x, y) {
                    this.pad1.x = x - this.pad1.w/2;
                },
                update(dt) {
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;

                    this.pad2.x += (this.ball.x - (this.pad2.x + this.pad2.w/2)) * 0.12;

                    if(this.ball.x < 8 || this.ball.x > this.w - 8) {
                        this.ball.vx *= -1;
                        AudioSys.playHit();
                    }

                    let hitPad = (p) => {
                        return this.ball.y > p.y && this.ball.y < p.y + p.h &&
                               this.ball.x > p.x && this.ball.x < p.x + p.w;
                    };

                    if(hitPad(this.pad1)) {
                        this.ball.vy = -Math.abs(this.ball.vy) * 1.04; 
                        this.ball.vx = (this.ball.x - (this.pad1.x + this.pad1.w/2)) * 0.12; 
                        AudioSys.playTone(320, 'triangle', 0.1, 0.1);
                        State.addXP(5);
                    }
                    if(hitPad(this.pad2)) {
                        this.ball.vy = Math.abs(this.ball.vy) * 1.04;
                        AudioSys.playTone(220, 'triangle', 0.1, 0.1);
                    }

                    if(this.ball.y < 50 || this.ball.y > this.h - 50) {
                        if(this.ball.y < 50) State.addXP(50); // Ponto!
                        this.ball.x = this.w/2; this.ball.y = this.h/2;
                        this.ball.vy = 6 * (Math.random() > 0.5 ? 1 : -1);
                        this.ball.vx = 6 * (Math.random() > 0.5 ? 1 : -1);
                        AudioSys.playTone(110, 'sawtooth', 0.4, 0.05);
                    }
                },
                draw(ctx) {
                    ctx.fillStyle = '#444';
                    ctx.fillRect(this.pad1.x, this.pad1.y, this.pad1.w, this.pad1.h);
                    ctx.fillRect(this.pad2.x, this.pad2.y, this.pad2.w, this.pad2.h);
                    
                    ctx.fillStyle = '#d4af37';
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.r, 0, Math.PI*2);
                    ctx.fill();
                }
            },

            // 05. BREAKOUT (Sinfonia de destruição de blocos)
            breakout: {
                ball: {x:0, y:0, vx:4, vy:-4, r:7},
                paddle: {x:0, y:0, w:90, h:10},
                bricks: [], rows: 4, cols: 6, bW: 0, bH: 18,
                setup(w, h) {
                    this.bW = (w - 40) / this.cols;
                    this.paddle.y = h - 100;
                    this.paddle.x = w/2 - 45;
                    this.ball.x = w/2; this.ball.y = h - 120;
                    this.ball.vx = 4; this.ball.vy = -4;
                    this.bricks = [];
                    for(let r=0; r<this.rows; r++) {
                        for(let c=0; c<this.cols; c++) {
                            this.bricks.push({x: 20 + c*this.bW, y: 110 + r*(this.bH + 5), active: true});
                        }
                    }
                },
                onDrag(x, y) { this.paddle.x = x - this.paddle.w/2; },
                update(dt) {
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;

                    if(this.ball.x < 8 || this.ball.x > window.innerWidth - 8) { this.ball.vx *= -1; AudioSys.playHit(); }
                    if(this.ball.y < 80) { this.ball.vy *= -1; AudioSys.playHit(); }

                    if(this.ball.y > this.paddle.y && this.ball.y < this.paddle.y + this.paddle.h &&
                       this.ball.x > this.paddle.x && this.ball.x < this.paddle.x + this.paddle.w) {
                        this.ball.vy = -Math.abs(this.ball.vy);
                        this.ball.vx = (this.ball.x - (this.paddle.x + this.paddle.w/2)) * 0.12;
                        AudioSys.playTone(280, 'sine', 0.08, 0.1);
                    }

                    this.bricks.forEach(b => {
                        if(!b.active) return;
                        if(this.ball.x > b.x && this.ball.x < b.x + this.bW &&
                           this.ball.y > b.y && this.ball.y < b.y + this.bH) {
                            b.active = false;
                            this.ball.vy *= -1;
                            AudioSys.playTone(523 + (Math.random()*400), 'triangle', 0.1, 0.12);
                            State.addXP(8);
                        }
                    });

                    if(this.ball.y > window.innerHeight) this.setup(window.innerWidth, window.innerHeight); // Reset
                },
                draw(ctx) {
                    ctx.fillStyle = '#444';
                    ctx.fillRect(this.paddle.x, this.paddle.y, this.paddle.w, this.paddle.h);
                    ctx.fillStyle = '#d4af37';
                    this.bricks.forEach(b => {
                        if(b.active) ctx.fillRect(b.x+1, b.y+1, this.bW-2, this.bH-2);
                    });
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.r, 0, Math.PI*2);
                    ctx.fill();
                }
            },

            // 06. LIFE GAME (Autômato Celular Interativo e Gerador Drone)
            life: {
                grid: [], nextGrid: [], cols: 25, rows: 25, size: 15, timer:0, play: false,
                setup(w, h) {
                    this.size = Math.floor(w / this.cols);
                    this.grid = Array(this.rows).fill(0).map(() => Array(this.cols).fill(false));
                    this.nextGrid = Array(this.rows).fill(0).map(() => Array(this.cols).fill(false));
                },
                onTap(x, y) {
                    let c = Math.floor(x / this.size);
                    let r = Math.floor((y - 100) / this.size);
                    if(r >= 0 && r < this.rows && c >= 0 && c < this.cols) {
                        this.grid[r][c] = !this.grid[r][c];
                        AudioSys.playTone(180 + r*15, 'sawtooth', 0.1, 0.05);
                    }
                    if(y > window.innerHeight - 100) this.play = !this.play; // Botão de controle
                },
                update(dt) {
                    if(!this.play) return;
                    this.timer += dt;
                    if(this.timer > 200) {
                        this.timer = 0;
                        let activeCount = 0;
                        for (let r = 0; r < this.rows; r++) {
                            for (let c = 0; c < this.cols; c++) {
                                let neighbors = 0;
                                for(let i=-1; i<=1; i++) {
                                    for(let j=-1; j<=1; j++) {
                                        if(i===0 && j===0) continue;
                                        let nr = (r + i + this.rows) % this.rows;
                                        let nc = (c + j + this.cols) % this.cols;
                                        if(this.grid[nr][nc]) neighbors++;
                                    }
                                }
                                if(this.grid[r][c]) {
                                    this.nextGrid[r][c] = neighbors === 2 || neighbors === 3;
                                    if(this.nextGrid[r][c]) activeCount++;
                                } else {
                                    this.nextGrid[r][c] = neighbors === 3;
                                    if(this.nextGrid[r][c]) activeCount++;
                                }
                            }
                        }
                        // Synth Drone com base na biomassa populacional
                        if(activeCount > 0) AudioSys.playTone(100 + (activeCount * 2) % 400, 'sine', 0.18, 0.03);
                        let temp = this.grid; this.grid = this.nextGrid; this.nextGrid = temp;
                    }
                },
                draw(ctx) {
                    for (let r = 0; r < this.rows; r++) {
                        for (let c = 0; c < this.cols; c++) {
                            ctx.strokeStyle = '#151515';
                            ctx.strokeRect(c*this.size, 100 + r*this.size, this.size, this.size);
                            if(this.grid[r][c]) {
                                ctx.fillStyle = '#d4af37';
                                ctx.fillRect(c*this.size+1, 100 + r*this.size+1, this.size-2, this.size-2);
                            }
                        }
                    }
                    // Botão Play/Pause
                    ctx.fillStyle = this.play ? 'rgba(212,175,55,0.2)' : '#1a1a1a';
                    ctx.fillRect(20, window.innerHeight - 80, window.innerWidth - 40, 45);
                    ctx.fillStyle = '#fff';
                    ctx.font = '11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.play ? 'SIMULANDO (TOQUE PARA CONFIGURAR)' : 'TOQUE PARA DESIGNAR CÉLULAS - CLIQUE AQUI PARA SIMULAR', window.innerWidth/2, window.innerHeight - 54);
                }
            },

            // 07. PULSER (Ritmo e Alinhamento Analógico)
            pulser: {
                radius: 0, target: 70, grow: true, score: 0, flash: 0,
                setup(w, h) {},
                onTap(x, y) {
                    let diff = Math.abs(this.radius - this.target);
                    if(diff < 8) {
                        this.score++;
                        this.flash = 12;
                        AudioSys.playTone(880, 'sine', 0.25, 0.15);
                        State.addXP(15);
                    } else {
                        AudioSys.playTone(80, 'triangle', 0.15, 0.1);
                    }
                },
                update(dt) {
                    if(this.grow) {
                        this.radius += 1.8;
                        if(this.radius > 140) this.grow = false;
                    } else {
                        this.radius -= 1.8;
                        if(this.radius < 5) this.grow = true;
                    }
                    if(this.flash > 0) this.flash--;
                },
                draw(ctx) {
                    let cx = window.innerWidth / 2;
                    let cy = window.innerHeight / 2;
                    
                    // Alvo Fixo
                    ctx.strokeStyle = this.flash > 0 ? '#fff' : '#444';
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(cx, cy, this.target, 0, Math.PI*2); ctx.stroke();

                    // Pulsor Dinâmico
                    ctx.strokeStyle = '#d4af37';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(cx, cy, this.radius, 0, Math.PI*2); ctx.stroke();
                }
            },

            // 08. SHIELD CORE (Escudo Defletor Circular)
            shield: {
                coreRadius: 20, shieldAngle: 0, particles: [], timer: 0, score: 0,
                setup(w, h) { this.particles = []; },
                onDrag(x, y) {
                    this.shieldAngle = Math.atan2(y - window.innerHeight/2, x - window.innerWidth/2);
                },
                update(dt) {
                    this.timer += dt;
                    if(this.timer > 1500) {
                        this.timer = 0;
                        let angle = Math.random() * Math.PI * 2;
                        this.particles.push({
                            x: window.innerWidth/2 + Math.cos(angle)*window.innerWidth,
                            y: window.innerHeight/2 + Math.sin(angle)*window.innerWidth,
                            vx: -Math.cos(angle)*2.5, vy: -Math.sin(angle)*2.5
                        });
                    }
                    this.particles.forEach((p, index) => {
                        p.x += p.vx; p.y += p.vy;
                        let dx = p.x - window.innerWidth/2;
                        let dy = p.y - window.innerHeight/2;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        // Detecção do Escudo (Raio 70)
                        if (dist < 75 && dist > 60) {
                            let pAngle = Math.atan2(dy, dx);
                            let ad = Math.abs(pAngle - this.shieldAngle);
                            if (ad < 0.5) { // Defletido!
                                this.particles.splice(index, 1);
                                AudioSys.playTone(440, 'sine', 0.1, 0.12);
                                State.addXP(10);
                            }
                        }
                        if(dist < this.coreRadius) {
                            this.particles.splice(index, 1);
                            AudioSys.playHit(); // Dano ao Core
                        }
                    });
                },
                draw(ctx) {
                    let cx = window.innerWidth / 2;
                    let cy = window.innerHeight / 2;

                    // Core
                    ctx.fillStyle = '#ff3333';
                    ctx.beginPath(); ctx.arc(cx, cy, this.coreRadius, 0, Math.PI*2); ctx.fill();

                    // Escudo
                    ctx.strokeStyle = '#d4af37';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 70, this.shieldAngle - 0.5, this.shieldAngle + 0.5);
                    ctx.stroke();

                    // Invasores de Partículas
                    ctx.fillStyle = '#fff';
                    this.particles.forEach(p => {
                        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                    });
                }
            },

            // 09. LABIRINTO (Gerador de Caminhos Procedural DFS)
            maze: {
                grid: [], cols: 11, rows: 11, w:0, h:0, pX: 1, pY: 1,
                setup(w, h) {
                    this.w = w; this.h = h;
                    this.generateMaze();
                },
                generateMaze() {
                    this.grid = Array(this.rows).fill(0).map(() => Array(this.cols).fill(1));
                    this.carve(1, 1);
                    this.grid[this.rows - 2][this.cols - 2] = 0; // Saída
                    this.pX = 1; this.pY = 1;
                },
                carve(cx, cy) {
                    this.grid[cy][cx] = 0;
                    let dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
                    for(let [dx, dy] of dirs) {
                        let nx = cx + dx, ny = cy + dy;
                        if(nx > 0 && nx < this.cols && ny > 0 && ny < this.rows && this.grid[ny][nx] === 1) {
                            this.grid[cy + dy/2][cx + dx/2] = 0;
                            this.carve(nx, ny);
                        }
                    }
                },
                onSwipe(dir) {
                    let nx = this.pX, ny = this.pY;
                    if(dir === 'UP') ny--;
                    if(dir === 'DOWN') ny++;
                    if(dir === 'LEFT') nx--;
                    if(dir === 'RIGHT') nx++;
                    
                    if(this.grid[ny][nx] === 0) {
                        this.pX = nx; this.pY = ny;
                        AudioSys.playTone(300 + (this.pY * 20), 'sine', 0.05, 0.05);
                        if(this.pX === this.cols-2 && this.pY === this.rows-2) {
                            AudioSys.playReward();
                            State.addXP(40);
                            this.generateMaze();
                        }
                    }
                },
                draw(ctx) {
                    let size = Math.min(this.w, this.h - 100) / this.cols;
                    let ox = (this.w - (this.cols * size)) / 2;
                    let oy = (this.h - (this.rows * size)) / 2 + 30;

                    for(let r=0; r<this.rows; r++) {
                        for(let c=0; c<this.cols; c++) {
                            ctx.fillStyle = this.grid[r][c] === 1 ? '#181818' : '#050505';
                            ctx.fillRect(ox + c*size, oy + r*size, size, size);
                        }
                    }
                    // Destino
                    ctx.fillStyle = 'rgba(212,175,55,0.3)';
                    ctx.fillRect(ox + (this.cols-2)*size, oy + (this.rows-2)*size, size, size);

                    // Player
                    ctx.fillStyle = '#d4af37';
                    ctx.beginPath();
                    ctx.arc(ox + this.pX*size + size/2, oy + this.pY*size + size/2, size/3, 0, Math.PI*2);
                    ctx.fill();
                }
            },

            // 10. MINAS (Varredura Tátil e Segura)
            mines: {
                grid: [], size: 6, cellSize: 45, ox: 0, oy:0, minesCount: 6, gameOver: false,
                setup(w, h) {
                    this.cellSize = Math.min(w, h) / 8;
                    this.ox = (w - (this.size * this.cellSize)) / 2;
                    this.oy = (h - (this.size * this.cellSize)) / 2 + 30;
                    this.reset();
                },
                reset() {
                    this.gameOver = false;
                    this.grid = Array(this.size).fill(0).map(() => Array(this.size).fill({mine: false, revealed: false, count: 0}));
                    let placed = 0;
                    while(placed < this.minesCount) {
                        let r = Math.floor(Math.random() * this.size);
                        let c = Math.floor(Math.random() * this.size);
                        if(!this.grid[r][c].mine) {
                            this.grid[r][c] = {mine: true, revealed: false, count: 0};
                            placed++;
                        }
                    }
                    for(let r=0; r<this.size; r++) {
                        for(let c=0; c<this.size; c++) {
                            if(this.grid[r][c].mine) continue;
                            let count = 0;
                            for(let i=-1; i<=1; i++) {
                                for(let j=-1; j<=1; j++) {
                                    let nr = r + i, nc = c + j;
                                    if(nr>=0 && nr<this.size && nc>=0 && nc<this.size && this.grid[nr][nc].mine) count++;
                                }
                            }
                            this.grid[r][c] = {mine: false, revealed: false, count: count};
                        }
                    }
                },
                onTap(x, y) {
                    if(this.gameOver) { this.reset(); return; }
                    let c = Math.floor((x - this.ox) / this.cellSize);
                    let r = Math.floor((y - this.oy) / this.cellSize);
                    if(c>=0 && c<this.size && r>=0 && r<this.size) {
                        let cell = this.grid[r][c];
                        if(cell.revealed) return;
                        cell.revealed = true;
                        if(cell.mine) {
                            this.gameOver = true;
                            AudioSys.playTone(80, 'sawtooth', 0.5, 0.2);
                        } else {
                            AudioSys.playTone(400 + cell.count*100, 'sine', 0.1, 0.1);
                            State.addXP(5);
                        }
                    }
                },
                draw(ctx) {
                    for(let r=0; r<this.size; r++) {
                        for(let c=0; c<this.size; c++) {
                            let cell = this.grid[r][c];
                            let x = this.ox + c*this.cellSize;
                            let y = this.oy + r*this.cellSize;
                            
                            ctx.fillStyle = cell.revealed ? '#0e0e0e' : '#1a1a1a';
                            ctx.fillRect(x+2, y+2, this.cellSize-4, this.cellSize-4);

                            if(cell.revealed) {
                                if(cell.mine) {
                                    ctx.fillStyle = '#ff3333';
                                    ctx.beginPath(); ctx.arc(x + this.cellSize/2, y + this.cellSize/2, 8, 0, Math.PI*2); ctx.fill();
                                } else if(cell.count > 0) {
                                    ctx.fillStyle = '#d4af37';
                                    ctx.font = '14px sans-serif';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.fillText(cell.count, x + this.cellSize/2, y + this.cellSize/2);
                                }
                            }
                        }
                    }
                }
            }
        };

        // 5. INICIALIZAÇÃO
        window.onload = () => M.init();

        // 6. SERVICE WORKER INLINE (Offline de Performance)
        const swCode = `
            const CACHE_NAME = 'modulo-cache-v2';
            self.addEventListener('install', e => { self.skipWaiting(); });
            self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
            self.addEventListener('fetch', e => {
                e.respondWith(
                    caches.match(e.request).then(response => {
                        return response || fetch(e.request).catch(() => {
                            return new Response('', { headers: { 'Content-Type': 'text/html' } });
                        });
                    })
                );
            });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).then(() => {
                console.log('MÓDULO: Service Worker Local Ativado (Offline Pronto).');
            });
        }

        // 7. WEB MANIFEST INLINE E ÍCONES NATIVOS ADAPTATIVOS
        const generateIcon = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.arc(256, 256, 155, 0, Math.PI * 2);
            ctx.fill();
            
            return canvas.toDataURL('image/png'); 
        };

        const iconPNG = generateIcon();

        const manifest = {
            "name": "MÓDULO Infinito",
            "short_name": "MÓDULO",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0a0a0a",
            "theme_color": "#0a0a0a",
            "icons": [
                {
                    "src": iconPNG,
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(linkManifest);

        const linkApple = document.createElement('link');
        linkApple.rel = 'apple-touch-icon';
        linkApple.href = iconPNG;
        document.head.appendChild(linkApple);

    </script>
</body>
